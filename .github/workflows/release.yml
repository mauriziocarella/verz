name: Build & Publish Library
run-name: "release: version `${{ github.ref_name }}`"

on:
    push:
        tags:
            - '*'

permissions:
    contents: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Use Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '24'
                    registry-url: 'https://registry.npmjs.org'

            -   name: Install pnpm
                uses: pnpm/action-setup@v3
                with:
                    version: 10

            -   name: Install dependencies
                run: pnpm install

            -   name: Build library
                run: pnpm build

            -   name: Update npm
                run: npm install -g npm@latest

            -   name: Publish to npm
                run: npm publish --access public

            -   name: Create GitHub release
                run: gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
                env:
                    GH_TOKEN: ${{ github.token }}
